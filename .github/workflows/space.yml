name: Deploy Hugging Face embedding worker

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "spaces/bge-worker/**"
      - "scripts/deploy_hf_space.py"
      - "src/bbc_news_logger/semantics.py"
      - "pyproject.toml"
      - ".github/workflows/space.yml"

concurrency:
  group: hugging-face-embedding-space
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - run: uv sync --frozen --no-dev
      - name: Publish the standard Gradio Space
        run: uv run --no-sync python scripts/deploy_hf_space.py
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_ID: ${{ vars.HF_SPACE_ID || 'AlastairH/bbc-news-semantic-backfill' }}
