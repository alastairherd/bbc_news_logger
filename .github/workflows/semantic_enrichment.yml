name: Refresh Fenic semantic signals

on:
  workflow_dispatch:
    inputs:
      limit:
        description: Number of recent article snapshots to enrich (1–200)
        required: true
        default: "25"
        type: string

concurrency:
  group: fenic-semantic-enrichment
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - run: uv sync --frozen --extra semantic
      - name: Extract typed story signals and publish them
        run: >-
          uv run --no-sync python services/fenic/bootstrap.py
          && uv run --no-sync python services/fenic/enrich.py
          --limit "${{ inputs.limit }}" --publish
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
