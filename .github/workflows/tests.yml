name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [ main ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Install the locked test environment
        run: uv sync --frozen --extra dev
      - name: Lint
        run: uv run --no-sync ruff check .
      - name: Test
        run: uv run --no-sync pytest -q

  dashboard:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run build

  fenic-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - run: uv sync --frozen --extra semantic
      - run: uv run --no-sync fenic check services/fenic/bootstrap.py
      - run: uv run --no-sync fenic check services/fenic/enrich.py
      - run: uv run --no-sync fenic check services/fenic/serve.py
