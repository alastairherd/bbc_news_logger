name: Fetch daily article snapshots

on:
  workflow_dispatch:
    inputs:
      date:
        description: UTC observation date (YYYY-MM-DD); defaults to yesterday
        required: false
        type: string
  schedule:
    - cron: "17 2 * * *"

concurrency:
  group: bbc-news-article-fetch
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Install the locked runtime
        run: uv sync --frozen --no-dev
      - name: Fetch, parse, and publish article snapshots
        shell: bash
        run: |
          args=(--upload)
          if [[ -n "${{ inputs.date }}" ]]; then
            args+=(--date "${{ inputs.date }}")
          fi
          uv run --no-sync bbc-news fetch-articles "${args[@]}"
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
