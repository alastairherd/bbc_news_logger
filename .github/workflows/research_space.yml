name: Deploy archive research Space

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "spaces/research/**"
      - "scripts/deploy_research_space.py"
      - ".github/workflows/research_space.yml"

concurrency:
  group: research-space
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - run: uv sync --frozen --no-dev
      - name: Upload the Python Space and configure its limited key
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY || secrets.DEEPSEEK_API }}
        run: uv run --no-sync python scripts/deploy_research_space.py
