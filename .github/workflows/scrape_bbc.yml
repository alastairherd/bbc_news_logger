name: Collect BBC News observations

on:
  workflow_dispatch:
  schedule:
    - cron: "7 * * * *"

concurrency:
  group: bbc-news-collection
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Install the locked runtime
        run: uv sync --frozen --no-dev
      - name: Collect, validate, and publish
        run: uv run --no-sync bbc-news scrape --upload
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
