name: Deploy archive research Worker

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "workers/research/**"
      - ".github/workflows/research_worker.yml"

concurrency:
  group: research-worker
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v7
      - name: Test Worker contract
        working-directory: workers/research
        run: npm test
      - name: Deploy Worker and encrypted DeepSeek key
        id: deploy
        if: env.CF_API_TOKEN != '' && env.CF_ACCOUNT_ID != ''
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ env.CF_API_TOKEN }}
          accountId: ${{ env.CF_ACCOUNT_ID }}
          wranglerVersion: "4.110.0"
          workingDirectory: workers/research
          command: deploy
          secrets: |
            DEEPSEEK_API_KEY
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY || secrets.DEEPSEEK_API }}
      - name: Explain skipped deployment
        if: env.CF_API_TOKEN == '' || env.CF_ACCOUNT_ID == ''
        run: echo "::notice::Add CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID to deploy the tested Worker."
